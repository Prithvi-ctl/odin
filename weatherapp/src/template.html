<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="container1">
            <div class="logo">
               
            </div>
            <h1>WEATHER APP</h1>
           
        </div>
    </header>
    <main class="Box">
        <h2>Welcome to the Weather App</h2>
        <p>Get accurate and up-to-date weather information for your location.</p>
        <button class="btn" >Get Weather</button>
        <div class="holder">
            <input type="text" placeholder="Enter city name" class="input"/>
            <div class="weather-info">
                <p class="temperature"></p>
                <p class="description"></p>
                <p class="timezone"></p>
                <p class="windspeed"></p>
            </div>
        </div>
    </main>
    
    <footer>
        <p>copyright &copy; 2024</p>
    </footer>
    
</body>
</html>
