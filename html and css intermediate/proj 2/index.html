<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form class="frm" action="" method="post">
        <div class="right">
            <div class="top shadow">
                <p>This is not a real online service! You know you need something
                like this in your life to help you realize your deepest dreams.
                Sign up now to get started.

                You know you want to.
            </div>
            <div class="middle shadow">
                <fieldset>
                    <legend>LOGIN</legend>
                    <div class="field">
                        <label for="fname">First Name:</label>
                        <input type="text" id="fname" name="fname">
                    </div>
                     <div class="field">
                        <label for="lname">Last Name:</label>
                        <input type="text" id="lname" name="lname">
                    </div>
                     <div class="field">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email">
                    </div>
                     <div class="field">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password">
                    </div>
                </fieldset>
            </div>
            <div class="bottom shadow">
                <button type="submit">SignUp</button>
                <p>Already have an account? <a href="#">Login</a></p>
            </div>
        </div>
        <div class="left">
            <div class="logo shadow">
                <img url="/home/obu/Documents/beginning/Dawn/logo.png" alt="logo"/>
            </div>
            <footer>
                <p>PHOTO BY <a href="https://unsplash.com/@dougschneiders">DOUG SCHNEIDERS</a> ON <a href="https://unsplash.com/">UNSPLASH</a></p>
            </footer>
        </div>
        
        </form>
    </div>
</body>
</html>
